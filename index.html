<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas del día</title>
<style>
  html, body { margin: 0; padding: 0; background: #12151a; min-height: 100vh; }
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Manrope:wght@400;500;600;700;800&display=swap');

  :root {
    --ink: #12151a;
    --ink-soft: #1b2028;
    --paper: #f4f0e4;
    --paper-dim: #e8e2d0;
    --text-hi: #f2efe6;
    --text-lo: #9aa0ab;
    --accent: #35a373;
    --accent-dim: #244a3b;
    --danger: #c4544b;
    --rule: #2a2f38;
  }

  * { box-sizing: border-box; }

  #app-root {
    background: var(--ink);
    color: var(--text-hi);
    font-family: 'Manrope', sans-serif;
    min-height: 100%;
    padding: 0;
    display: flex;
    justify-content: center;
  }

  .app-shell {
    width: 100%;
    max-width: 440px;
    padding: 28px 18px 100px;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 4px;
  }

  h1 {
    font-size: 26px;
    font-weight: 800;
    margin: 0 0 20px;
    letter-spacing: -0.01em;
  }

  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  .month-nav button {
    background: var(--ink-soft);
    border: 1px solid var(--rule);
    color: var(--text-hi);
    width: 36px;
    height: 36px;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
  }
  .month-nav button:active { transform: scale(0.95); }

  .month-label {
    font-weight: 700;
    font-size: 16px;
    text-transform: capitalize;
  }

  .summary-card {
    background: linear-gradient(160deg, var(--accent-dim), var(--ink-soft));
    border: 1px solid var(--rule);
    border-radius: 18px;
    padding: 20px 20px 16px;
    margin-bottom: 22px;
  }

  .summary-total-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-lo);
  }

  .summary-total {
    font-family: 'JetBrains Mono', monospace;
    font-size: 40px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    margin: 4px 0 14px;
    color: var(--text-hi);
  }

  .summary-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-lo);
  }
  .summary-row b { color: var(--text-hi); font-weight: 600; }

  .btn-scan {
    width: 100%;
    background: var(--ink-soft);
    border: 1px dashed var(--accent);
    color: var(--text-hi);
    padding: 13px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 10px;
  }
  .btn-scan:active { transform: scale(0.98); }
  .btn-scan:disabled { opacity: 0.6; }

  .scan-note {
    font-size: 12px;
    color: var(--accent);
    margin: -2px 0 14px 2px;
  }

  .entry-form {
    background: var(--ink-soft);
    border: 1px solid var(--rule);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
  }

  .form-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 10px;
  }

  .field { flex: 1 1 130px; min-width: 0; }
  .field label {
    display: block;
    font-size: 11px;
    color: var(--text-lo);
    margin-bottom: 6px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
  }
  .field input {
    width: 100%;
    min-width: 0;
    background: var(--ink);
    border: 1px solid var(--rule);
    color: var(--text-hi);
    padding: 10px 10px;
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
  }
  .field input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

  .form-total {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'JetBrains Mono', monospace;
    padding: 8px 2px 12px;
    border-bottom: 1px dashed var(--rule);
    margin-bottom: 12px;
  }
  .form-total span:first-child {
    font-size: 11px;
    color: var(--text-lo);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .form-total span:last-child {
    font-size: 20px;
    font-weight: 700;
  }

  .iva-toggle {
    background: none;
    border: none;
    color: var(--text-lo);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    padding: 0 0 10px;
    text-decoration: underline;
  }

  .btn-save {
    width: 100%;
    background: var(--accent);
    color: #08130e;
    border: none;
    font-weight: 800;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
  }
  .btn-save:disabled { opacity: 0.5; cursor: default; }
  .btn-save:active { transform: scale(0.97); }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-lo);
    margin: 0 0 10px 4px;
  }

  .ticket {
    position: relative;
    background: var(--paper);
    color: var(--ink);
    border-radius: 4px;
    padding: 12px 14px;
    margin-bottom: 10px;
    box-shadow: 0 6px 14px -8px rgba(0,0,0,0.5);
  }
  .ticket::before, .ticket::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    height: 6px;
    background:
      radial-gradient(circle at 6px 3px, var(--ink) 3px, transparent 3.5px) repeat-x;
    background-size: 12px 6px;
  }
  .ticket::before { top: -3px; }
  .ticket::after { bottom: -3px; transform: rotate(180deg); }

  .ticket-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .ticket-date {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 14px;
  }
  .ticket-weekday {
    font-size: 10px;
    color: #6b6555;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 1px;
  }
  .ticket-amount {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 16px;
    font-variant-numeric: tabular-nums;
  }
  .ticket-del {
    background: none;
    border: none;
    color: var(--danger);
    font-size: 16px;
    cursor: pointer;
    padding: 4px 0 4px 12px;
    line-height: 1;
  }
  .ticket-sub {
    display: flex;
    gap: 14px;
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #6b6555;
  }

  .ticket-list {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px dashed #c9c2ac;
  }
  .ticket-line {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 4px 0;
    color: #4a453a;
  }

  .empty-state {
    text-align: center;
    color: var(--text-lo);
    font-size: 13px;
    padding: 30px 10px;
    border: 1px dashed var(--rule);
    border-radius: 14px;
  }

  .export-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    justify-content: center;
    padding: 14px 18px;
    background: linear-gradient(to top, var(--ink) 60%, transparent);
  }
  .btn-export {
    width: 100%;
    max-width: 404px;
    background: var(--text-hi);
    color: var(--ink);
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  .btn-export:active { transform: scale(0.98); }
  .btn-export:disabled { opacity: 0.4; }

  .toast {
    position: fixed;
    top: 18px; left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #08130e;
    padding: 9px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    z-index: 50;
  }
</style>
</head>
<body>
<div id="app-root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

const MESES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
const DIAS = ["dom","lun","mar","mié","jue","vie","sáb"];

function pad(n){ return String(n).padStart(2,"0"); }
function monthKey(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}`; }
function todayISO(){
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function fmtEUR(n){
  return new Intl.NumberFormat('es-ES', {style:'currency', currency:'EUR'}).format(n || 0);
}
function num(v){
  if (v === "" || v === null || v === undefined) return 0;
  const n = parseFloat(String(v).replace(',', '.'));
  return isNaN(n) ? 0 : n;
}
function normalizeEntry(e){
  // Compatibilidad con el formato anterior, donde cada día guardaba solo un número (el total)
  if (typeof e === 'number') return { efectivo: e, tarjeta: 0, otro: 0, base10: null, base21: null };
  return { otro: 0, ...(e || {}), efectivo: (e && e.efectivo) || 0, tarjeta: (e && e.tarjeta) || 0 };
}
function normalizeDayTickets(raw){
  // Un día puede tener: nada, un número antiguo, un objeto único (v2), o una lista de tickets (v3)
  if (raw === undefined || raw === null) return [];
  if (Array.isArray(raw)) return raw.map(normalizeEntry);
  return [normalizeEntry(raw)];
}
function sumTickets(tickets){
  return tickets.reduce((acc, t) => {
    acc.efectivo += Number(t.efectivo || 0);
    acc.tarjeta += Number(t.tarjeta || 0);
    acc.otro += Number(t.otro || 0);
    acc.base10 += Number(t.base10 || 0);
    acc.base21 += Number(t.base21 || 0);
    return acc;
  }, { efectivo: 0, tarjeta: 0, otro: 0, base10: 0, base21: 0 });
}

// --- OCR parsing helpers -------------------------------------------------
const NUM_RE = /\d{1,3}(?:[.,]\d{3})*[.,]\d{2}/g;
function toNumber(c){
  let v = c;
  if (v.includes(',') && v.includes('.')) v = v.replace(/\./g, '').replace(',', '.');
  else if (v.includes(',')) v = v.replace(',', '.');
  return parseFloat(v);
}
function firstNumberOnLine(line){
  const m = line.match(NUM_RE);
  if (!m) return null;
  const n = toNumber(m[m.length - 1]);
  return isNaN(n) ? null : n;
}
function leadingNumberOnLine(line){
  // Toma el PRIMER número de la línea (útil para "10%  14,91  1,49" -> queremos 14,91, no la cuota 1,49)
  const m = line.match(NUM_RE);
  if (!m) return null;
  const n = toNumber(m[0]);
  return isNaN(n) ? null : n;
}
function extractFields(text){
  const lines = text.split('\n');
  const result = { efectivo: null, tarjeta: null, otro: null, base10: null, base21: null, total: null };
  const noise = /subtotal|cambio|entreg|devuel/i;

  // Busca un número en la propia línea, o si no hay, en las 2 líneas siguientes
  // (algunos tickets ponen la etiqueta y el importe en líneas separadas)
  function findNearbyNumber(startIdx){
    for (let i = startIdx; i <= startIdx + 2 && i < lines.length; i++) {
      const n = firstNumberOnLine(lines[i]);
      if (n !== null) return n;
    }
    return null;
  }

  for (let idx = 0; idx < lines.length; idx++) {
    const line = lines[idx];
    if (result.efectivo === null && /efectivo/i.test(line) && !noise.test(line)) {
      const n = findNearbyNumber(idx);
      if (n !== null) result.efectivo = n;
    }
    if (result.tarjeta === null && /(tarjeta|visa|master|d[eé]bito|cr[eé]dito|tpv)/i.test(line)) {
      const n = findNearbyNumber(idx);
      if (n !== null) result.tarjeta = n;
    }
    if (result.otro === null && /(bizum|vale|cheque|transferencia)/i.test(line)) {
      const n = findNearbyNumber(idx);
      if (n !== null) result.otro = n;
    }
    if (result.base10 === null && /10\s?%/.test(line)) {
      const n = leadingNumberOnLine(line);
      if (n !== null) result.base10 = n;
    }
    if (result.base21 === null && /21\s?%/.test(line)) {
      const n = leadingNumberOnLine(line);
      if (n !== null) result.base21 = n;
    }
    if (result.total === null && /total/i.test(line) && !noise.test(line)) {
      const n = findNearbyNumber(idx);
      if (n !== null) result.total = n;
    }
  }
  return result;
}

function App(){
  const [cursor, setCursor] = useState(new Date());
  const [entries, setEntries] = useState(null); // {"01": {efectivo,tarjeta,base10,base21}, ...}
  const [loading, setLoading] = useState(true);
  const [dateVal, setDateVal] = useState(todayISO());
  const [efectivoVal, setEfectivoVal] = useState("");
  const [tarjetaVal, setTarjetaVal] = useState("");
  const [otroVal, setOtroVal] = useState("");
  const [base10Val, setBase10Val] = useState("");
  const [base21Val, setBase21Val] = useState("");
  const [showIva, setShowIva] = useState(false);
  const [toast, setToast] = useState(null);
  const [saving, setSaving] = useState(false);
  const [exporting, setExporting] = useState(false);
  const [scanning, setScanning] = useState(false);
  const [scanNote, setScanNote] = useState(null);
  const fileInputRef = useRef(null);

  const key = monthKey(cursor);

  const loadMonth = useCallback((mkey) => {
    setLoading(true);
    try {
      const raw = localStorage.getItem(`ventas:${mkey}`);
      setEntries(raw ? JSON.parse(raw) : {});
    } catch (e) {
      setEntries({});
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { loadMonth(key); }, [key, loadMonth]);

  function showToast(msg){
    setToast(msg);
    setTimeout(() => setToast(null), 1800);
  }

  const formTotal = num(efectivoVal) + num(tarjetaVal) + num(otroVal);

  function resetForm(){
    setEfectivoVal("");
    setTarjetaVal("");
    setOtroVal("");
    setBase10Val("");
    setBase21Val("");
    setScanNote(null);
  }

  function saveEntry(e){
    e.preventDefault();
    if (!dateVal || (efectivoVal === "" && tarjetaVal === "" && otroVal === "")) return;
    const [y, m, d] = dateVal.split("-");
    const mkey = `${y}-${m}`;
    setSaving(true);
    try {
      const raw = mkey === key ? (entries ? entries[d] : undefined) : JSON.parse(localStorage.getItem(`ventas:${mkey}`) || "{}")[d];
      const currentMonthData = mkey === key ? (entries || {}) : JSON.parse(localStorage.getItem(`ventas:${mkey}`) || "{}");
      const dayTickets = normalizeDayTickets(raw);
      dayTickets.push({
        efectivo: num(efectivoVal),
        tarjeta: num(tarjetaVal),
        otro: num(otroVal),
        base10: base10Val === "" ? null : num(base10Val),
        base21: base21Val === "" ? null : num(base21Val),
      });
      const updated = { ...currentMonthData, [d]: dayTickets };
      localStorage.setItem(`ventas:${mkey}`, JSON.stringify(updated));
      if (mkey === key) setEntries(updated);
      if (mkey !== key) setCursor(new Date(Number(y), Number(m) - 1, 1));
      resetForm();
      showToast(dayTickets.length > 1 ? `Ticket añadido (${dayTickets.length} ese día)` : "Guardado");
    } catch (err) {
      showToast("Error al guardar");
    } finally {
      setSaving(false);
    }
  }

  function deleteTicket(day, idx){
    const dayTickets = normalizeDayTickets(entries[day]).filter((_, i) => i !== idx);
    const updated = { ...entries };
    if (dayTickets.length) updated[day] = dayTickets;
    else delete updated[day];
    try {
      localStorage.setItem(`ventas:${key}`, JSON.stringify(updated));
      setEntries(updated);
    } catch (err) {
      showToast("Error al borrar");
    }
  }

  function changeMonth(delta){
    const next = new Date(cursor.getFullYear(), cursor.getMonth() + delta, 1);
    setCursor(next);
  }

  const sortedDays = useMemo(() => {
    if (!entries) return [];
    return Object.keys(entries).sort((a,b) => Number(b) - Number(a));
  }, [entries]);

  const totals = useMemo(() => {
    if (!entries) return { total: 0, efectivo: 0, tarjeta: 0, base10: 0, base21: 0 };
    return Object.values(entries).reduce((acc, raw) => {
      const s = sumTickets(normalizeDayTickets(raw));
      acc.efectivo += s.efectivo;
      acc.tarjeta += s.tarjeta;
      acc.base10 += s.base10;
      acc.base21 += s.base21;
      return acc;
    }, { efectivo: 0, tarjeta: 0, base10: 0, base21: 0 });
  }, [entries]);
  totals.total = totals.efectivo + totals.tarjeta + totals.otro;

  const numDays = sortedDays.length;
  const avg = numDays ? totals.total / numDays : 0;

  function exportMonth(){
    if (!numDays) return;
    setExporting(true);
    try {
      const [y, m] = key.split("-");
      const rows = [];
      sortedDays
        .slice()
        .sort((a,b) => Number(a) - Number(b))
        .forEach(day => {
          const tickets = normalizeDayTickets(entries[day]);
          const dateObj = new Date(Number(y), Number(m)-1, Number(day));
          tickets.forEach((t, i) => {
            const tot = Number(t.efectivo||0) + Number(t.tarjeta||0) + Number(t.otro||0);
            rows.push({
              "Fecha": `${day}/${m}/${y}`,
              "Día": DIAS[dateObj.getDay()],
              "Ticket #": i + 1,
              "Efectivo (€)": Number(t.efectivo || 0),
              "Tarjeta (€)": Number(t.tarjeta || 0),
              "Otros (€)": Number(t.otro || 0),
              "Total (€)": Number(tot.toFixed(2)),
              "Base IVA 10% (€)": t.base10 === null || t.base10 === undefined ? "" : Number(t.base10),
              "Base IVA 21% (€)": t.base21 === null || t.base21 === undefined ? "" : Number(t.base21),
            });
          });
        });
      rows.push({
        "Fecha": "", "Día": "", "Ticket #": "TOTAL",
        "Efectivo (€)": Number(totals.efectivo.toFixed(2)),
        "Tarjeta (€)": Number(totals.tarjeta.toFixed(2)),
        "Otros (€)": Number(totals.otro.toFixed(2)),
        "Total (€)": Number(totals.total.toFixed(2)),
        "Base IVA 10% (€)": Number(totals.base10.toFixed(2)),
        "Base IVA 21% (€)": Number(totals.base21.toFixed(2)),
      });

      const ws = XLSX.utils.json_to_sheet(rows);
      ws['!cols'] = [{wch:12},{wch:7},{wch:9},{wch:13},{wch:13},{wch:11},{wch:12},{wch:16},{wch:16}];
      const wb = XLSX.utils.book_new();
      const sheetName = `${MESES[Number(m)-1].slice(0,3)} ${y}`;
      XLSX.utils.book_append_sheet(wb, ws, sheetName);
      XLSX.writeFile(wb, `resumen_ventas_${y}-${m}.xlsx`);
      showToast("Excel generado");
    } catch (err) {
      showToast("Error al exportar");
    } finally {
      setExporting(false);
    }
  }

  function handleScan(e){
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setScanning(true);
    setScanNote(null);
    Tesseract.recognize(file, 'spa')
      .then(({ data }) => {
        const f = extractFields(data.text);
        let filled = [];
        if (f.efectivo !== null) { setEfectivoVal(f.efectivo.toFixed(2)); filled.push('efectivo'); }
        if (f.tarjeta !== null) { setTarjetaVal(f.tarjeta.toFixed(2)); filled.push('tarjeta'); }
        if (f.otro !== null) { setOtroVal(f.otro.toFixed(2)); filled.push('otros'); }
        if (f.base10 !== null) { setBase10Val(f.base10.toFixed(2)); setShowIva(true); }
        if (f.base21 !== null) { setBase21Val(f.base21.toFixed(2)); setShowIva(true); }
        if (!filled.length && f.total !== null) {
          // fallback: couldn't split efectivo/tarjeta, but got a total — put it in efectivo so nothing is lost
          setEfectivoVal(f.total.toFixed(2));
          filled.push('total (revisa efectivo/tarjeta)');
        }
        if (filled.length) {
          setScanNote(`Detectado: ${filled.join(', ')} — revisa antes de guardar.`);
        } else {
          setScanNote("No he podido leer los importes. Escríbelos a mano.");
        }
      })
      .catch(() => setScanNote("Error al leer la foto. Inténtalo de nuevo."))
      .finally(() => setScanning(false));
  }

  return (
    <div className="app-shell">
      <p className="eyebrow">Registro diario</p>
      <h1>Ventas del día</h1>

      <div className="month-nav">
        <button onClick={() => changeMonth(-1)} aria-label="Mes anterior">‹</button>
        <div className="month-label">{MESES[cursor.getMonth()]} {cursor.getFullYear()}</div>
        <button onClick={() => changeMonth(1)} aria-label="Mes siguiente">›</button>
      </div>

      <div className="summary-card">
        <div className="summary-total-label">Total del mes</div>
        <div className="summary-total">{loading ? "…" : fmtEUR(totals.total)}</div>
        <div className="summary-row">
          <span>Efectivo: <b>{loading ? "-" : fmtEUR(totals.efectivo)}</b></span>
          <span>Tarjeta: <b>{loading ? "-" : fmtEUR(totals.tarjeta)}</b></span>
          {totals.otro > 0 && <span>Otros: <b>{fmtEUR(totals.otro)}</b></span>}
        </div>
        <div className="summary-row" style={{marginTop:6}}>
          <span>Días: <b>{loading ? "-" : numDays}</b></span>
          <span>Media/día: <b>{loading ? "-" : fmtEUR(avg)}</b></span>
        </div>
      </div>

      <button type="button" className="btn-scan" onClick={() => fileInputRef.current && fileInputRef.current.click()} disabled={scanning}>
        {scanning ? "Leyendo el ticket…" : "📷 Escanear ticket"}
      </button>
      <input ref={fileInputRef} type="file" accept="image/*" capture="environment"
             style={{display:"none"}} onChange={handleScan} />
      {scanNote && <p className="scan-note">{scanNote}</p>}

      <form className="entry-form" onSubmit={saveEntry}>
        <div className="form-row">
          <div className="field">
            <label htmlFor="f-date">Fecha</label>
            <input id="f-date" type="date" value={dateVal} max={todayISO()}
                   onChange={e => setDateVal(e.target.value)} required />
          </div>
        </div>
        {(() => {
          const [dy, dm, dd] = dateVal.split("-");
          if (`${dy}-${dm}` !== key || !entries) return null;
          const tickets = normalizeDayTickets(entries[dd]);
          if (!tickets.length) return null;
          const s = sumTickets(tickets);
          return (
            <p className="scan-note" style={{color:"var(--text-lo)"}}>
              Ya llevas {tickets.length} ticket{tickets.length>1?'s':''} ese día · acumulado {fmtEUR(s.efectivo+s.tarjeta+s.otro)}
            </p>
          );
        })()}

        <div className="form-row">
          <div className="field">
            <label htmlFor="f-efectivo">Efectivo (€)</label>
            <input id="f-efectivo" type="text" inputMode="decimal" placeholder="0,00"
                   value={efectivoVal} onChange={e => setEfectivoVal(e.target.value)} />
          </div>
          <div className="field">
            <label htmlFor="f-tarjeta">Tarjeta (€)</label>
            <input id="f-tarjeta" type="text" inputMode="decimal" placeholder="0,00"
                   value={tarjetaVal} onChange={e => setTarjetaVal(e.target.value)} />
          </div>
          <div className="field">
            <label htmlFor="f-otro">Otros (Bizum, vales…)</label>
            <input id="f-otro" type="text" inputMode="decimal" placeholder="0,00"
                   value={otroVal} onChange={e => setOtroVal(e.target.value)} />
          </div>
        </div>

        <div className="form-total">
          <span>Total de este ticket</span>
          <span>{fmtEUR(formTotal)}</span>
        </div>

        <button type="button" className="iva-toggle" onClick={() => setShowIva(s => !s)}>
          {showIva ? "− Ocultar desglose IVA" : "+ Añadir desglose IVA (opcional)"}
        </button>

        {showIva && (
          <div className="form-row">
            <div className="field">
              <label htmlFor="f-base10">Base IVA 10%</label>
              <input id="f-base10" type="text" inputMode="decimal" placeholder="0,00"
                     value={base10Val} onChange={e => setBase10Val(e.target.value)} />
            </div>
            <div className="field">
              <label htmlFor="f-base21">Base IVA 21%</label>
              <input id="f-base21" type="text" inputMode="decimal" placeholder="0,00"
                     value={base21Val} onChange={e => setBase21Val(e.target.value)} />
            </div>
          </div>
        )}

        <button className="btn-save" type="submit" disabled={saving}>
          {saving ? "..." : "+ Añadir ticket"}
        </button>
      </form>

      <p className="section-label">Este mes · ticket a ticket</p>

      {loading ? (
        <div className="empty-state">Cargando…</div>
      ) : sortedDays.length === 0 ? (
        <div className="empty-state">Todavía no hay ventas registradas este mes.</div>
      ) : (
        sortedDays.map(day => {
          const [y, m] = key.split("-");
          const dateObj = new Date(Number(y), Number(m)-1, Number(day));
          const tickets = normalizeDayTickets(entries[day]);
          return tickets.map((t, i) => {
            const tot = Number(t.efectivo||0) + Number(t.tarjeta||0) + Number(t.otro||0);
            return (
              <div className="ticket" key={`${day}-${i}`}>
                <div className="ticket-top">
                  <div>
                    <div className="ticket-date">{day}/{m}/{y}</div>
                    <div className="ticket-weekday">
                      {DIAS[dateObj.getDay()]}{tickets.length > 1 ? ` · ticket ${i+1}/${tickets.length}` : ""}
                    </div>
                  </div>
                  <div style={{display:"flex", alignItems:"center"}}>
                    <div className="ticket-amount">{fmtEUR(tot)}</div>
                    <button className="ticket-del" onClick={() => deleteTicket(day, i)} aria-label="Borrar">✕</button>
                  </div>
                </div>
                <div className="ticket-sub">
                  <span>Efvo {fmtEUR(t.efectivo||0)}</span>
                  <span>Tarj {fmtEUR(t.tarjeta||0)}</span>
                  {t.otro > 0 && <span>Otros {fmtEUR(t.otro)}</span>}
                  {(t.base10 || t.base21) ? <span>IVA 10/21 registrado</span> : null}
                </div>
              </div>
            );
          });
        })
      )}

      <div className="export-bar">
        <button className="btn-export" onClick={exportMonth} disabled={exporting || numDays === 0}>
          {exporting ? "Generando…" : `Exportar resumen de ${MESES[cursor.getMonth()]} a Excel`}
        </button>
      </div>

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
</script>
</body>
</html>
